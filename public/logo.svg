<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4af37" />
      <stop offset="40%" stop-color="#f3e5ab" />
      <stop offset="60%" stop-color="#aa7c11" />
      <stop offset="100%" stop-color="#2a1f00" />
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a6300" />
      <stop offset="20%" stop-color="#d4af37" />
      <stop offset="50%" stop-color="#fcf6ba" />
      <stop offset="80%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#8a6300" />
    </linearGradient>
  </defs>

  <!-- Sofa -->
  <g transform="translate(120, 80)">
    <!-- Back cushions -->
    <rect x="20" y="10" width="50" height="40" rx="5" fill="url(#gold)" />
    <rect x="75" y="10" width="50" height="40" rx="5" fill="url(#gold)" />
    <!-- Armrests -->
    <rect x="0" y="30" width="20" height="40" rx="8" fill="url(#gold)" />
    <rect x="125" y="30" width="20" height="40" rx="8" fill="url(#gold)" />
    <!-- Base -->
    <rect x="0" y="55" width="145" height="20" rx="5" fill="url(#gold)" />
    <!-- Legs -->
    <polygon points="10,75 15,75 12,95 7,95" fill="#4a3500" />
    <polygon points="135,75 130,75 133,95 138,95" fill="#4a3500" />
  </g>

  <!-- Chair -->
  <g transform="translate(260, 80)">
    <!-- Back -->
    <path d="M 35 5 C 50 5, 55 20, 55 45 L 15 45 C 10 30, 20 5, 35 5 Z" fill="url(#gold)" />
    <!-- Seat -->
    <ellipse cx="35" cy="50" rx="30" ry="8" fill="url(#gold)" />
    <!-- Legs -->
    <polygon points="15,55 20,55 10,95 5,95" fill="#4a3500" />
    <polygon points="55,55 50,55 60,95 65,95" fill="#4a3500" />
    <polygon points="30,55 33,55 30,95 27,95" fill="#4a3500" />
  </g>

  <!-- Floor Line -->
  <line x1="100" y1="175" x2="400" y2="175" stroke="#4a3500" stroke-width="2" />

  <!-- Text NEW KRISHNA -->
  <text x="250" y="215" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="url(#goldText)" text-anchor="middle" letter-spacing="3">NEW KRISHNA</text>
  
  <!-- Pill FURNITURE -->
  <rect x="160" y="230" width="180" height="34" rx="17" fill="#222" />
  <text x="250" y="252" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle" letter-spacing="5">FURNITURE</text>

  <!-- Side lines for pill -->
  <line x1="110" y1="247" x2="150" y2="247" stroke="#4a3500" stroke-width="2" />
  <line x1="350" y1="247" x2="390" y2="247" stroke="#4a3500" stroke-width="2" />
</svg>
